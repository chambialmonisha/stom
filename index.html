<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stomata VR</title>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div class="viewer">

<iframe
src="https://sketchfab.com/models/00ffda2fc813426a9852abe6350332ca/embed?
autostart=1
&preload=1
&autospin=1
&autospin_delay=0
&ui_controls=0
&ui_infos=0
&ui_stop=0
&ui_watermark=0
&transparent=1
&dnt=1"

allow="
autoplay;
fullscreen;
xr-spatial-tracking;
gyroscope;
accelerometer;
vr;
">
</iframe>

</div>

</body>
</html>
